version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: supermercado-db
    environment:
      POSTGRES_DB: supermercado_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supermercado-network

  api:
    build: .
    container_name: supermercado-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/supermercado_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    networks:
      - supermercado-network

volumes:
  postgres_data:

networks:
  supermercado-network:
    driver: bridge